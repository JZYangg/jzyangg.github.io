<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | JZYangg</title>
    <link rel="stylesheet" href="index.css">
</head>
<body class="linktree-page">

    <div class="floating-dots-container" id="dotsContainer"></div>

    <div class="audio-control-group">
        <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="100" aria-label="Volume Slider">
        <button id="volume-toggle" class="audio-btn linktree-audio-btn" aria-label="Toggle Volume">
            <span class="icon-mute">🔇</span>
            <span class="icon-unmute" style="display: none;">🔊</span>
        </button>
    </div>
    
    <div class="video-background">
        <div id="bgVideo"></div>
    </div>
    
    <main class="bento-container linktree-grid">
        <header class="hero-card linktree-header">
            <button id="theme-toggle" class="theme-btn linktree-toggle">
                <span class="icon-sun">☀️</span>
                <span class="icon-moon">🌙</span>
            </button>

            <img src="/assets/Pictures/jzyangg.png" alt="JZYang" class="profile-glow">
            <h1>JZYang<span>.</span></h1>
            <p>Dev logs • Stream vibes • Creative chaos</p>
        </header>

        <div class="icons-row">
            <a href="https://www.instagram.com/_jz.yang" class="social-icon-tile" aria-label="Instagram">
                <img src="/assets/Icons/instagram.png" alt="Instagram" class="custom-icon">
            </a>

            <a href="https://twitter.com/jzyangg" class="social-icon-tile" aria-label="Twitter">
                <img src="/assets/Icons/twitter.png" alt="Twitter" class="custom-icon">
            </a>

            <a href="https://twitch.tv/jzyangg" class="social-icon-tile" aria-label="Twitch">
                <img src="/assets/Icons/twitch.png" alt="Twitch" class="custom-icon">
            </a>

            <a href="https://tiktok.com/@_jzyang" class="social-icon-tile" aria-label="TikTok">
                <img src="/assets/Icons/tiktok.png" alt="TikTok" class="custom-icon">
            </a>

            <a href="https://www.youtube.com/@jzyangglive" class="social-icon-tile" aria-label="YouTube">
                <img src="/assets/Icons/youtube.png" alt="YouTube" class="custom-icon">
            </a>

            <a href="https://dsc.gg/jzyangg" class="social-icon-tile" aria-label="Discord">
                <img src="/assets/Icons/discord.png" alt="Discord" class="custom-icon">
            </a>
        </div>

    </main>
    
    <footer>
        <p>© 2026 JZYang • <span class="dim">Designed by JZYangg</span></p>
    </footer>

    <script>
        // --- YouTube Iframe Player API Setup ---
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        let lastVolume = 50;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('bgVideo', {
                videoId: 's4Ow55AbdCg',
                playerVars: {
                    'autoplay': 1,
                    'mute': 1,
                    'loop': 1,
                    'playlist': 's4Ow55AbdCg', 
                    'controls': 0,
                    'showinfo': 0,
                    'rel': 0,
                    'modestbranding': 1,
                    'iv_load_policy': 3,
                    'playsinline': 1,
                    'enablejsapi': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange 
                }
            });
        }

        function onPlayerReady(event) {
            event.target.playVideo();
            
            const volumeBtn = document.getElementById('volume-toggle');
            const muteIcon = volumeBtn.querySelector('.icon-mute');
            const unmuteIcon = volumeBtn.querySelector('.icon-unmute');
            const volumeSlider = document.getElementById('volume-slider');

            volumeSlider.value = lastVolume;

            volumeBtn.addEventListener('click', () => {
                if (player.isMuted()) {
                    player.unMute();
                    if (lastVolume === 0) lastVolume = 30;
                    player.setVolume(lastVolume);
                    volumeSlider.value = lastVolume;

                    muteIcon.style.display = 'none';
                    unmuteIcon.style.display = 'block';
                } else {
                    lastVolume = player.getVolume();
                    player.mute();
                    volumeSlider.value = 0;

                    muteIcon.style.display = 'block';
                    unmuteIcon.style.display = 'none';
                }
            });

            volumeSlider.addEventListener('input', (e) => {
                const vol = parseInt(e.target.value);
                player.setVolume(vol);

                // FIX: Changed from 'player == 0' to 'vol === 0'
                if (vol === 0) {
                    player.mute();
                    muteIcon.style.display = 'block';
                    unmuteIcon.style.display = 'none';
                } else {
                    if (player.isMuted()) {
                        player.unMute();
                    }
                    lastVolume = vol;
                    muteIcon.style.display = 'none';
                    unmuteIcon.style.display = 'block'; // FIX: Removed camelCase variable typo here
                }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PAUSED) {
                player.playVideo();
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            // --- Theme Toggle Logic ---
            const themeBtn = document.getElementById('theme-toggle');
            const body = document.body;

            if (localStorage.getItem('theme') === 'dark') {
                body.classList.add('dark-mode');
            }

            themeBtn.addEventListener('click', () => {
                body.classList.toggle('dark-mode');
                const isDark = body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });

            // --- Floating Dots Logic ---
            const container = document.getElementById("dotsContainer");
            const dotCount = 25;

            for (let i = 0; i < dotCount; i++) {
                const dot = document.createElement("div");
                dot.classList.add("dot");

                const size = Math.random() * 14 + 6;    
                const delay = Math.random() * 10;        
                const duration = Math.random() * 12 + 8; 
                const leftPosition = Math.random() * 100;

                dot.style.width = `${size}px`;
                dot.style.height = `${size}px`;
                dot.style.left = `${leftPosition}%`;
                dot.style.animationDelay = `${delay}s`;
                dot.style.animationDuration = `${duration}s`;

                container.appendChild(dot);
            }
        });
    </script>
</body>
</html>
