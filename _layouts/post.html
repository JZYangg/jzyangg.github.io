---
layout: default
---
<article class="post-container" style="max-width: 800px; margin: 0 auto; padding: 20px; font-family: sans-serif; line-height: 1.6;">
  
  <header class="post-header" style="margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 10px;">
    <h1 style="font-size: 2.5rem; margin-bottom: 10px;">{{ page.title }}</h1>
    <p class="post-meta" style="color: #666; font-style: italic;">
      Published on {{ page.date | date: "%B %d, %Y" }}
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer style="margin-top: 50px; padding-top: 20px; border-top: 1px solid #eee;">
    <a href="/blogs" style="text-decoration: none; color: #007bff; font-weight: bold;">← Back to Blog</a>
  </footer>

</article>
