<html lang="en">
<head>

<body class="linktree-page">
    
    <main class="bento-container linktree-grid">
        <header class="hero-card linktree-header">
            <button id="theme-toggle" class="theme-btn linktree-toggle">
                <span class="icon-sun">☀️</span>
                <span class="icon-moon">🌙</span>
            </button>

            <img src="images/jzyang-pfp.png" alt="JZYang" class="profile-glow">
            <h1>JZYang<span>.</span></h1>
            <p>Dev logs • Stream vibes • Creative chaos</p>
        </header>

        <a href="https://www.instagram.com/_jz.yang" class="bento-card social-tile twitter">
            <span class="icon">📸</span>
            <h3>Instagram</h3>
            <p>Life behind the scenes</p>
        </a>

        <a href="https://tiktok.com/@_jzyang" class="bento-card social-tile twitch">
            <span class="icon">🎬</span>
            <h3>Tiktok</h3>
            <p>Catch the chaos live</p>
        </a>


        <a href="https://twitch.tv/jzyangg" class="bento-card social-tile twitch">
            <span class="icon">🎬</span>
            <h3>Twitch</h3>
            <p>Catch the chaos live</p>

        <a href="https://twitter.com/jzyangg" class="bento-card social-tile twitter">

        <a href="https://dsc.gg/jzyangg" class="bento-card social-tile discord">

        </a>

    </main>
        <footer>
            <p>© 2026 JZYang • <span class="dim">Designed by JZYangg</span></p>
        </footer>

    <script>
        const themeBtn = document.getElementById('theme-toggle');
    const body = document.body;

    // Check for saved theme
    if (localStorage.getItem('theme') === 'dark') {
        body.classList.add('dark-mode');
    }

    themeBtn.addEventListener('click', () => {
        body.classList.toggle('dark-mode');
        const isDark = body.classList.contains('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
    </script>
</body>
